services:
  - type: web
    name: nigeria-fraud-api
    env: python
    plan: free
    branch: main
    buildCommand: "pip install --upgrade pip && pip install -r requirements-prod.txt"
    startCommand: "uvicorn api.main:app --host 0.0.0.0 --port $PORT --workers 4"
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
